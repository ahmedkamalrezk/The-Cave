<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Logs | The Cave</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'JetBrains Mono', monospace; background-color: #000; color: #00FF00; }
    .accent { color: #E6E6FA; }
    .border-accent { border-color: rgba(230, 230, 250, 0.2); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-[#00FF00] selection:text-black">
  <div class="max-w-2xl w-full border border-accent p-12 space-y-8 bg-[#0a0a0a] shadow-[0_0_50px_rgba(230,230,250,0.05)]">
    <div class="flex items-center gap-2 mb-8">
      <div class="w-2 h-2 bg-[#00FF00] rounded-full"></div>
      <h1 class="text-xl font-bold accent uppercase tracking-widest">System Update Logs</h1>
    </div>

    <div class="space-y-12">
      <!-- Entry -->
      <div class="space-y-4">
        <div class="flex justify-between items-center text-xs opacity-40">
          <span>v1.0.0-STABLE</span>
          <span>2026.04.22</span>
        </div>
        <h2 class="text-sm font-bold uppercase tracking-widest accent">Initial Sanctuary Launch</h2>
        <ul class="text-xs space-y-2 text-[#00FF00]/70 list-none p-0">
          <li>- Core terminal engine implemented</li>
          <li>- Local-first IndexedDB persistence</li>
          <li>- Pomodoro Focus Mode integration</li>
          <li>- Multi-platform PWA deployment protocols</li>
          <li>- Lavender/Green aesthetic overhaul</li>
        </ul>
      </div>

      <!-- More entries can go here -->
    </div>

    <div class="pt-8 border-t border-accent/20">
      <a href="/" class="inline-block text-xs uppercase tracking-[0.3em] visited:text-[#00FF00] hover:text-white transition-colors">
        [ RETURN TO SURFACE ]
      </a>
    </div>
  </div>
</body>
</html>
